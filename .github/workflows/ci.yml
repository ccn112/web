name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      # Build the two apps we ship (cms + clay). Payload builds with env
      # fallbacks and connects to the DB lazily, so dummy values are enough.
      - name: Build CMS
        run: pnpm --filter @x/cms build
        env:
          PAYLOAD_SECRET: ci-dummy-secret
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Build clay
        run: pnpm --filter @x/clay build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
